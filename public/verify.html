<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verificar Cuenta - Mirai AI</title>
    <link rel="stylesheet" href="login-styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="auth-header">
                <div class="logo-container">
                    <span class="logo-icon">📧</span>
                </div>
                <h1>Verificación</h1>
                <p class="subtitle">Introduce el código enviado a tu correo</p>
            </div>

            <div class="error-message" id="error-msg"></div>
            <div class="success-message" id="success-msg"></div>

            <form id="verify-form" class="auth-form">
                <div class="input-group">
                    <label for="dni">DNI</label>
                    <div class="input-field">
                        <input type="text" id="dni" name="dni" required placeholder="Tu DNI">
                        <span class="input-icon">🆔</span>
                    </div>
                </div>

                <div class="input-group">
                    <label for="otp">Código de Verificación</label>
                    <div class="input-field">
                        <input type="text" id="otp" name="otp" required placeholder="123456" maxlength="6" pattern="[0-9]{6}">
                        <span class="input-icon">🔢</span>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary" id="verify-btn">
                    <span class="btn-text">Verificar</span>
                    <span class="btn-loader hidden">⏳</span>
                </button>
            </form>

            <div class="auth-footer">
                <span>¿No recibiste el correo? <a href="#" id="resend-link" class="link">Reenviar</a></span>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('verify-form');
            const errorMsg = document.getElementById('error-msg');
            const successMsg = document.getElementById('success-msg');
            const verifyBtn = document.getElementById('verify-btn');
            const resendLink = document.getElementById('resend-link');

            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                const dni = document.getElementById('dni').value;
                const otp = document.getElementById('otp').value;

                setLoading(verifyBtn, true);
                hideMessages();

                try {
                    const res = await fetch('/api/verify', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ dni, code: otp })
                    });

                    const data = await res.json();

                    if (!res.ok) throw new Error(data.error);

                    showSuccess(successMsg, '✅ ¡Cuenta verificada! Redirigiendo al login...');
                    setTimeout(() => window.location.href = 'login.html', 2000);

                } catch (err) {
                    showError(errorMsg, err.message);
                } finally {
                    setLoading(verifyBtn, false);
                }
            });

            resendLink.addEventListener('click', async (e) => {
                e.preventDefault();
                const dni = document.getElementById('dni').value;
                if(!dni) {
                    showError(errorMsg, 'Ingresa tu DNI primero para reenviar.');
                    return;
                }
                
                // Llamada a un endpoint /api/resend-otp
                alert('Se ha reenviado el código a tu correo.');
            });

            // Utilidades (mismas que en login.js)
            function setLoading(btn, loading) { /* ... */ }
            function showError(el, msg) { /* ... */ }
            function showSuccess(el, msg) { /* ... */ }
            function hideMessages() { /* ... */ }
        });
    </script>
</body>
</html>
