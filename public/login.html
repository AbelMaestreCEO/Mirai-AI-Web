<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Mirai AI</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: var(--bg-color); }
        .auth-container { background: var(--card-bg); padding: 2rem; border-radius: 12px; width: 100%; max-width: 400px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        .auth-container h2 { text-align: center; margin-bottom: 1.5rem; color: var(--text-primary); }
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; color: var(--text-secondary); }
        .form-group input { width: 100%; padding: 0.75rem; border: 1px solid var(--border-color); border-radius: 6px; background: var(--input-bg); color: var(--text-primary); box-sizing: border-box; }
        .btn-primary { width: 100%; padding: 0.75rem; background: var(--accent-color); color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: opacity 0.2s; }
        .btn-primary:hover { opacity: 0.9; }
        .auth-links { margin-top: 1rem; text-align: center; font-size: 0.9rem; }
        .auth-links a { color: var(--accent-color); text-decoration: none; }
        .error-msg { color: #ff4444; text-align: center; margin-bottom: 1rem; display: none; }
    </style>
</head>
<body>
    <div class="auth-container">
        <h2>🔐 Bienvenido de nuevo</h2>
        <div id="error-msg" class="error-msg"></div>
        <form id="login-form">
            <div class="form-group">
                <label for="dni">DNI</label>
                <input type="text" id="dni" required placeholder="Ingresa tu DNI">
            </div>
            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" required placeholder="••••••••">
            </div>
            <button type="submit" class="btn-primary">Iniciar Sesión</button>
        </form>
        <div class="auth-links">
            ¿No tienes cuenta? <a href="registration.html">Regístrate aquí</a>
        </div>
    </div>

    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const dni = document.getElementById('dni').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('error-msg');

            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ dni, password })
                });

                const data = await res.json();

                if (!res.ok) {
                    throw new Error(data.error || 'Error de login');
                }

                // Guardar token
                localStorage.setItem('mirai_auth_token', data.token);
                localStorage.setItem('mirai_user_dni', data.dni);
                
                // Redirigir
                window.location.href = 'index.html';
            } catch (err) {
                errorDiv.textContent = err.message;
                errorDiv.style.display = 'block';
            }
        });
    </script>
</body>
</html>
