<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Mirai AI</title>
    <link rel="stylesheet" href="login-styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="auth-header">
                <div class="logo-container">
                    <span class="logo-icon">🔐</span>
                </div>
                <h1>Bienvenido de nuevo</h1>
                <p class="subtitle">Ingresa tus credenciales para continuar</p>
            </div>

            <div class="error-message" id="error-msg"></div>

            <form id="login-form" class="auth-form">
                <div class="input-group">
                    <label for="dni">DNI</label>
                    <div class="input-field">
                        <input type="text" id="dni" name="dni" required placeholder="Ingresa tu DNI" autocomplete="username">
                        <span class="input-icon">🆔</span>
                    </div>
                </div>

                <div class="input-group">
                    <label for="password">Contraseña</label>
                    <div class="input-field">
                        <input type="password" id="password" name="password" required placeholder="••••••••" autocomplete="current-password">
                        <span class="input-icon">🔒</span>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary" id="login-btn">
                    <span class="btn-text">Iniciar Sesión</span>
                    <span class="btn-loader hidden">⏳</span>
                </button>
            </form>

            <div class="auth-footer">
                <a href="#" class="link" id="forgot-link">¿Olvidaste tu contraseña?</a>
                <span class="divider">|</span>
                <span>¿No tienes cuenta? <a href="registration.html" class="link">Regístrate</a></span>
            </div>
        </div>
    </div>

    <!-- Modal de Recuperación -->
    <div class="modal-overlay" id="recovery-modal">
        <div class="modal-card">
            <button class="modal-close" id="close-modal">&times;</button>
            <div class="modal-header">
                <span class="modal-icon">📧</span>
                <h2>Recuperar Contraseña</h2>
                <p>Te enviaremos un enlace para restablecer tu acceso</p>
            </div>

            <div class="recovery-message" id="recovery-msg"></div>

            <form id="recovery-form" class="auth-form">
                <div class="input-group">
                    <label for="recovery-email">Correo Electrónico</label>
                    <div class="input-field">
                        <input type="email" id="recovery-email" name="email" required placeholder="tu@email.com">
                        <span class="input-icon">📧</span>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary" id="recovery-btn">
                    <span class="btn-text">Enviar Enlace</span>
                    <span class="btn-loader hidden">⏳</span>
                </button>
            </form>
        </div>
    </div>

    <script src="login.js"></script>
</body>
</html>
