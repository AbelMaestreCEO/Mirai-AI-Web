<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrarse - Mirai AI</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="login-styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="auth-header">
                <div class="logo-container">
                    <span class="logo-icon">🚀</span>
                </div>
                <h1>Crea tu cuenta</h1>
                <p class="subtitle">Únete a Mirai AI en segundos</p>
            </div>

            <div class="error-message" id="error-msg"></div>
            <div class="success-message" id="success-msg"></div>

            <form id="register-form" class="auth-form">
                <div class="input-row">
                    <div class="input-group">
                        <label for="first_name">Nombre</label>
                        <div class="input-field">
                            <input type="text" id="first_name" name="first_name" required placeholder="Tu nombre">
                            <span class="input-icon">👤</span>
                        </div>
                    </div>

                    <div class="input-group">
                        <label for="last_name">Apellido</label>
                        <div class="input-field">
                            <input type="text" id="last_name" name="last_name" required placeholder="Tu apellido">
                            <span class="input-icon">👤</span>
                        </div>
                    </div>
                </div>

                <div class="input-group">
                    <label for="dni">DNI</label>
                    <div class="input-field">
                        <input type="text" id="dni" name="dni" required placeholder="Número de identificación">
                        <span class="input-icon">🆔</span>
                    </div>
                </div>

                <div class="input-group">
                    <label for="email">Correo Electrónico</label>
                    <div class="input-field">
                        <input type="email" id="email" name="email" required placeholder="tu@email.com">
                        <span class="input-icon">📧</span>
                    </div>
                </div>

                <div class="input-group">
                    <label for="password">Contraseña</label>
                    <div class="input-field">
                        <input type="password" id="password" name="password" required minlength="8" placeholder="Mínimo 8 caracteres">
                        <span class="input-icon">🔒</span>
                    </div>
                </div>

                <div class="input-group">
                    <label for="confirm-password">Confirmar Contraseña</label>
                    <div class="input-field">
                        <input type="password" id="confirm-password" name="confirm_password" required placeholder="Repite tu contraseña">
                        <span class="input-icon">🔒</span>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary" id="register-btn">
                    <span class="btn-text">Crear Cuenta</span>
                    <span class="btn-loader hidden">⏳</span>
                </button>
            </form>

            <div class="auth-footer">
                <span>¿Ya tienes cuenta? <a href="login.html" class="link">Inicia sesión</a></span>
            </div>
        </div>
    </div>

    <script src="registration.js"></script>
</body>
</html>
