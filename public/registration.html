<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrarse - Mirai AI</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        /* Estilos similares a login.html */
        body { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: var(--bg-color); }
        .auth-container { background: var(--card-bg); padding: 2rem; border-radius: 12px; width: 100%; max-width: 400px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        .auth-container h2 { text-align: center; margin-bottom: 1.5rem; color: var(--text-primary); }
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; color: var(--text-secondary); }
        .form-group input { width: 100%; padding: 0.75rem; border: 1px solid var(--border-color); border-radius: 6px; background: var(--input-bg); color: var(--text-primary); box-sizing: border-box; }
        .btn-primary { width: 100%; padding: 0.75rem; background: var(--accent-color); color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: opacity 0.2s; }
        .btn-primary:hover { opacity: 0.9; }
        .auth-links { margin-top: 1rem; text-align: center; font-size: 0.9rem; }
        .auth-links a { color: var(--accent-color); text-decoration: none; }
        .error-msg { color: #ff4444; text-align: center; margin-bottom: 1rem; display: none; }
        .success-msg { color: #34c759; text-align: center; margin-bottom: 1rem; display: none; }
    </style>
</head>
<body>
    <div class="auth-container">
        <h2>🚀 Crea tu cuenta</h2>
        <div id="error-msg" class="error-msg"></div>
        <div id="success-msg" class="success-msg">¡Registro exitoso! Redirigiendo...</div>
        <form id="register-form">
            <div class="form-group">
                <label for="dni">DNI</label>
                <input type="text" id="dni" required placeholder="Tu número de identificación">
            </div>
            <div class="form-group">
                <label for="email">Correo Electrónico</label>
                <input type="email" id="email" required placeholder="tu@email.com">
            </div>
            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" required minlength="8" placeholder="Mínimo 8 caracteres">
            </div>
            <div class="form-group">
                <label for="confirm-password">Confirmar Contraseña</label>
                <input type="password" id="confirm-password" required placeholder="Repite tu contraseña">
            </div>
            <button type="submit" class="btn-primary">Registrarse</button>
        </form>
        <div class="auth-links">
            ¿Ya tienes cuenta? <a href="login.html">Inicia sesión</a>
        </div>
    </div>

    <script>
        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const dni = document.getElementById('dni').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm-password').value;
            const errorDiv = document.getElementById('error-msg');
            const successDiv = document.getElementById('success-msg');

            if (password !== confirmPassword) {
                errorDiv.textContent = 'Las contraseñas no coinciden';
                errorDiv.style.display = 'block';
                return;
            }

            try {
                const res = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ dni, email, password })
                });

                const data = await res.json();

                if (!res.ok) {
                    throw new Error(data.error || 'Error de registro');
                }

                successDiv.style.display = 'block';
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 2000);
            } catch (err) {
                errorDiv.textContent = err.message;
                errorDiv.style.display = 'block';
            }
        });
    </script>
</body>
</html>
