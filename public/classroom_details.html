<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalle de Tarea - Mirai AI</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .detail-container { max-width: 800px; margin: 40px auto; padding: 20px; }
        .assignment-header { background: var(--card-bg); padding: 30px; border-radius: 12px; margin-bottom: 30px; }
        .upload-section { background: var(--card-bg); padding: 30px; border-radius: 12px; border: 2px dashed var(--border-color); text-align: center; }
        .upload-section.drag-over { border-color: var(--primary-color); background: rgba(67, 97, 238, 0.05); }
        .file-input-wrapper { position: relative; overflow: hidden; display: inline-block; margin-top: 20px; }
        .btn-upload { background: var(--primary-color); color: white; padding: 12px 24px; border-radius: 8px; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; }
        .btn-upload input[type=file] { position: absolute; left: 0; top: 0; opacity: 0; width: 100%; height: 100%; cursor: pointer; }
        .status-message { margin-top: 15px; padding: 10px; border-radius: 6px; display: none; }
        .status-success { background: #d4edda; color: #155724; }
        .status-error { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-title">Detalle de Tarea</div>
        <button onclick="window.history.back()" class="btn-back">← Volver</button>
    </header>

    <main class="detail-container">
        <div id="assignment-details" class="assignment-header">
            <h1 id="task-title">Cargando...</h1>
            <p id="task-desc"></p>
        </div>

        <div id="upload-section" class="upload-section">
            <h3>Subir Trabajo Final</h3>
            <p>Formato aceptado: PDF (Máx 10MB)</p>
            
            <div class="file-input-wrapper">
                <button class="btn-upload">
                    <svg viewBox="0 0 24 24" width="20" height="20"><path d="M9 16h6v-6h4l-7-7-7 7h4zm-4 2h14v2H5z"/></svg>
                    Seleccionar Archivo PDF
                </button>
                <input type="file" id="file-input" accept=".pdf">
            </div>
            
            <div id="file-name-display" style="margin-top: 10px; font-weight: bold;"></div>
            <div id="upload-status" class="status-message"></div>
        </div>
    </main>

    <script src="classroom_details.js"></script>
</body>
</html>
