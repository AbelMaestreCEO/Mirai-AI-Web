<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalles del Curso - Mirai AI</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        /* Estilos específicos para Course Details */
        .course-details-container {
            max-width: 900px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .course-header {
            text-align: center;
            margin-bottom: 40px;
            padding: 40px;
            background: var(--glass-bg);
            border-radius: var(--border-radius-lg);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(40px);
        }

        .course-icon-large {
            font-size: 4rem;
            margin-bottom: 16px;
            display: block;
        }

        .course-title {
            font-size: 2.5rem;
            font-weight: 800;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 12px;
        }

        .course-meta-row {
            display: flex;
            justify-content: center;
            gap: 24px;
            color: var(--text-secondary);
            font-size: 0.95rem;
            margin-top: 16px;
        }

        .lessons-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .lesson-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: var(--border-radius-md);
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: all var(--transition-fast);
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .lesson-card:hover {
            transform: translateX(8px);
            border-color: var(--accent-color);
            box-shadow: 0 4px 12px var(--accent-glow);
        }

        .lesson-number {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-tertiary);
            margin-right: 20px;
            min-width: 40px;
            text-align: center;
        }

        .lesson-info {
            flex: 1;
        }

        .lesson-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 4px;
        }

        .lesson-desc {
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        .lesson-action {
            background: var(--accent-gradient);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: var(--border-radius-pill);
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform var(--transition-fast);
            margin-left: 20px;
        }

        .lesson-action:hover {
            transform: scale(1.05);
        }

        .loading-state, .error-state {
            text-align: center;
            padding: 40px;
            color: var(--text-secondary);
            font-size: 1.1rem;
        }

        /* Responsive */
        @media (max-width: 600px) {
            .lesson-card {
                flex-direction: column;
                align-items: flex-start;
                gap: 12px;
            }
            .lesson-number { margin-right: 0; }
            .lesson-action { width: 100%; margin-left: 0; }
        }
    </style>
</head>
<body>

    <!-- Sidebar y Header (Igual que index.html y courses.html) -->
    <!-- Copia aquí el nav y header de tus otras páginas para consistencia -->
    <nav class="mobile-sidebar">
        <!-- ... contenido sidebar ... -->
    </nav>
    <div class="mobile-overlay"></div>
    <header class="header">
        <button class="mobile-menu-toggle">&equiv;</button>
        <div class="header-title">Detalles del Curso</div>
        <button id="theme-toggle" class="theme-toggle">🌓</button>
    </header>

    <!-- Contenido Principal -->
    <div class="course-details-container">
        <div id="loading" class="loading-state">Cargando curso...</div>
        
        <div id="course-content" style="display: none;">
            <div class="course-header">
                <span id="detail-icon" class="course-icon-large">📚</span>
                <h1 id="detail-title" class="course-title">Cargando...</h1>
                <p id="detail-desc">Descripción del curso.</p>
                <div class="course-meta-row">
                    <span id="detail-level">Nivel</span>
                    <span id="detail-lessons">0 lecciones</span>
                    <span id="detail-duration">0 horas</span>
                </div>
            </div>

            <h2 style="margin-bottom: 20px; color: var(--text-primary);">Lecciones</h2>
            <div id="lessons-container" class="lessons-list">
                <!-- Las lecciones se inyectarán aquí -->
            </div>
        </div>

        <div id="error-msg" class="error-state" style="display: none;"></div>
    </div>

    <script>
        // --- LÓGICA DE CARGA ---
        document.addEventListener('DOMContentLoaded', async () => {
            // 1. Obtener ID del curso de la URL
            const urlParams = new URLSearchParams(window.location.search);
            const courseId = urlParams.get('course');

            if (!courseId) {
                showError('No se especificó un curso. <a href="courses.html">Volver a Cursos</a>');
                return;
            }

            // 2. Cargar datos del curso y lecciones desde D1 (via Worker)
            try {
                const response = await fetch(`/api/course-details?id=${encodeURIComponent(courseId)}`);
                
                if (!response.ok) {
                    throw new Error('Curso no encontrado');
                }

                const data = await response.json();
                renderCourse(data);

            } catch (error) {
                console.error('Error:', error);
                showError(`Error cargando el curso: ${error.message}`);
            }
        });

        function renderCourse(data) {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('course-content').style.display = 'block';

            // Renderizar Header
            document.getElementById('detail-icon').textContent = data.icon || '📚';
            document.getElementById('detail-title').textContent = data.title;
            document.getElementById('detail-desc').textContent = data.description;
            document.getElementById('detail-level').textContent = `Nivel: ${data.level}`;
            document.getElementById('detail-lessons').textContent = `${data.lessons} lecciones`;
            document.getElementById('detail-duration').textContent = data.duration;

            // Renderizar Lecciones
            const container = document.getElementById('lessons-container');
            container.innerHTML = '';

            if (!data.lessons_list || data.lessons_list.length === 0) {
                container.innerHTML = '<div class="loading-state">No hay lecciones disponibles aún.</div>';
                return;
            }

            data.lessons_list.forEach((lesson, index) => {
                const card = document.createElement('div');
                card.className = 'lesson-card';
                card.onclick = () => startLesson(lesson.id, data.id);

                card.innerHTML = `
                    <div class="lesson-number">${index + 1}</div>
                    <div class="lesson-info">
                        <div class="lesson-title">${escapeHtml(lesson.title)}</div>
                        <div class="lesson-desc">${escapeHtml(lesson.content || 'Sin descripción')}</div>
                    </div>
                    <button class="lesson-action">Comenzar</button>
                `;
                container.appendChild(card);
            });
        }

        function startLesson(lessonId, courseId) {
            // Redirigir al chat con contexto específico
            // index.html?course=html5&lesson=html5-01
            window.location.href = `index.html?course=${courseId}&lesson=${lessonId}`;
        }

        function showError(msg) {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('error-msg').style.display = 'block';
            document.getElementById('error-msg').innerHTML = msg;
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
