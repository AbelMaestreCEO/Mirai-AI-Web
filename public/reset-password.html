                (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
            var isDark = theme === 'dark';

            document.documentElement.setAttribute('data-theme', theme);

            if (s.accentColor && COLORS[s.accentColor]) {
                var c = COLORS[s.accentColor];
                var r = document.documentElement;
                r.style.setProperty('--accent-color', isDark ? c.cD : c.c);
                r.style.setProperty('--accent-gradient', isDark ? c.gD : c.g);

<body>
    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="auth-header">
                <div class="logo-container">
                    <span class="logo-icon">🔑</span>
                </div>
                <h1>Restablecer Contraseña</h1>
                <p class="subtitle">Ingresa tu nueva contraseña</p>
            </div>

            <div class="error-message" id="error-msg"></div>
            <div class="recovery-message" id="success-msg"></div>

            <form id="reset-form" class="auth-form">
                <div class="input-group">
                    <label for="new-password">Nueva Contraseña</label>
                    <div class="input-field">
                        <input type="password" id="new-password" name="new-password" required
                            placeholder="Mínimo 8 caracteres" minlength="8" autocomplete="new-password">
                        <span class="input-icon">🔒</span>
                    </div>
                </div>

                <div class="input-group">
                    <label for="confirm-password">Confirmar Contraseña</label>
                    <div class="input-field">
                        <input type="password" id="confirm-password" name="confirm-password" required
                            placeholder="Repite tu contraseña" minlength="8" autocomplete="new-password">
                        <span class="input-icon">🔒</span>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary" id="reset-btn">
                    <span class="btn-text">Cambiar Contraseña</span>
                    <span class="btn-loader hidden">⏳</span>
                </button>
            </form>

            <div class="auth-footer">
                <a href="login" class="link">Volver al inicio de sesión</a>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const form = document.getElementById('reset-form');
            const errorMsg = document.getElementById('error-msg');
            const successMsg = document.getElementById('success-msg');
            const resetBtn = document.getElementById('reset-btn');
            const btnText = resetBtn.querySelector('.btn-text');
            const btnLoader = resetBtn.querySelector('.btn-loader');

            const params = new URLSearchParams(window.location.search);
            const token = params.get('token');

            if (!token) {
                errorMsg.textContent = 'Enlace inválido. Solicita un nuevo enlace de recuperación.';
                errorMsg.classList.add('visible');
                form.style.display = 'none';
                return;
            }

            form.addEventListener('submit', async function (e) {
                e.preventDefault();
                errorMsg.classList.remove('visible');
                successMsg.classList.remove('visible');

                const newPassword = document.getElementById('new-password').value;
                const confirmPassword = document.getElementById('confirm-password').value;

                if (newPassword !== confirmPassword) {
                    errorMsg.textContent = 'Las contraseñas no coinciden.';
                    errorMsg.classList.add('visible');
                    return;
                }

                if (newPassword.length < 8) {
                    errorMsg.textContent = 'La contraseña debe tener al menos 8 caracteres.';
                    errorMsg.classList.add('visible');
                    return;
                }

                btnText.classList.add('hidden');
                btnLoader.classList.remove('hidden');
                resetBtn.disabled = true;

                try {
                    const response = await fetch('/api/reset-password', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ token: token, new_password: newPassword })
                    });

                    const data = await response.json();

                    if (data.success) {
                        successMsg.textContent = '¡Contraseña actualizada! Redirigiendo al login...';
                        successMsg.classList.add('visible');
                        form.style.display = 'none';
                        setTimeout(function () {
                            window.location.href = '/login';
                        }, 2500);
                    } else {
                        errorMsg.textContent = data.error || 'Error al restablecer la contraseña.';
                        errorMsg.classList.add('visible');
                    }
                } catch (err) {
                    errorMsg.textContent = 'Error de conexión. Inténtalo de nuevo.';
                    errorMsg.classList.add('visible');
                } finally {
                    btnText.classList.remove('hidden');
                    btnLoader.classList.add('hidden');
                    resetBtn.disabled = false;
                }
            });
        });
    </script>
    <script src="transitions.js"></script>
</body>

</html>
