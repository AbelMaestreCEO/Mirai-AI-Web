<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula Virtual - Mirai AI</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        /* Estilos específicos para Classroom (se mantienen igual) */
        .classroom-container { max-width: 1200px; margin: 0 auto; padding: 20px; padding-top: 80px; }
        .dashboard-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .stat-card { background: var(--card-bg); padding: 20px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); text-align: center; }
        .stat-number { font-size: 2rem; font-weight: bold; color: var(--primary-color); }
        .task-list { display: grid; gap: 20px; }
        .task-card { background: var(--card-bg); border-radius: 12px; padding: 20px; display: flex; justify-content: space-between; align-items: center; transition: transform 0.2s; border-left: 4px solid var(--accent-color); }
        .task-card:hover { transform: translateY(-2px); }
        .task-card.completed { border-left-color: #4caf50; opacity: 0.8; }
        .task-info h3 { margin: 0 0 8px 0; font-size: 1.1rem; }
        .task-meta { font-size: 0.85rem; color: var(--text-secondary); display: flex; gap: 15px; flex-wrap: wrap; }
        .task-actions { display: flex; gap: 10px; }
        .btn-primary { background: var(--primary-color); color: white; padding: 8px 16px; border-radius: 6px; text-decoration: none; font-size: 0.9rem; }
        .status-badge { padding: 4px 8px; border-radius: 4px; font-size: 0.75rem; font-weight: bold; }
        .status-pending { background: #fff3cd; color: #856404; }
        .status-completed { background: #d4edda; color: #155724; }
        .status-late { background: #f8d7da; color: #721c24; }
        .empty-state { text-align: center; padding: 40px; color: var(--text-secondary); font-size: 1.1rem; }
    </style>
</head>
<body>

    <!-- PANEL LATERAL (COPIADO DE INDEX.HTML) -->
    <nav class="mobile-sidebar">
        <div class="sidebar-header">
            <h3>Mirai AI</h3>
            <button class="close-menu" aria-label="Cerrar menú">&times;</button>
        </div>
        <div class="sidebar-content">
            <section class="sidebar-section">
                <h4>Navegación</h4>
                <ul class="sidebar-links">
                    <li><a href="index.html" class="nav-link">💬 Chat con Mirai</a></li>
                    <li><a href="classroom.html" class="nav-link active-link">📚 Aula Virtual</a></li>
                    <li><a href="course_category.html" class="nav-link">📚 Cursos</a></li>
                </ul>
            </section>
            <!-- Secciones desplegables y redes sociales (igual que index.html) -->
            <section class="sidebar-section collapsible-section">
                <div class="collapsible-header"><h4>Servicios</h4>...</div>
                <div class="collapsible-content"><ul class="sidebar-links">...</ul></div>
            </section>
            <!-- ... (Resto del sidebar idéntico a index.html) ... -->
             <section class="sidebar-section">
                <h4>Síguenos</h4>
                <div class="sidebar-social">
                    <!-- Iconos sociales -->
                </div>
            </section>
            <button id="logout-btn" class="logout-btn">
                <svg viewBox="0 0 24 24" width="18" height="18"><path d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z"/></svg>
                <span>Cerrar Sesión</span>
            </button>
            <div class="sidebar-logo">
                <a href="https://aberumirai.com"><img src="https://assets.aberumirai.com/imgs/icon.webp" alt="Logo"></a>
            </div>
        </div>
        <div class="sidebar-footer"><p>&copy; <script>document.write(new Date().getFullYear())</script> Aberu & Mirai Company</p></div>
    </nav>
    <div class="mobile-overlay"></div>

    <!-- HEADER -->
    <header class="header">
        <button class="mobile-menu-toggle" aria-label="Abrir menú">
            <span class="hamburger-line"></span><span class="hamburger-line"></span><span class="hamburger-line"></span>
        </button>
        <div class="header-title">Aula Virtual</div>
        <button id="theme-toggle" class="theme-toggle">🌓</button>
    </header>

    <!-- CONTENIDO PRINCIPAL -->
    <main class="classroom-container">
        <div class="dashboard-header">
            <h1>Mis Tareas</h1>
            <div id="user-greeting">Hola, Estudiante</div>
        </div>

        <div class="stats-grid">
            <div class="stat-card"><div class="stat-number" id="pending-count">0</div><div>Pendientes</div></div>
            <div class="stat-card"><div class="stat-number" id="completed-count">0</div><div>Completadas</div></div>
            <div class="stat-card"><div class="stat-number" id="avg-score">-</div><div>Promedio</div></div>
        </div>

        <div id="tasks-container" class="task-list">
            <div class="loading-state">Cargando tareas...</div>
        </div>
    </main>

    <script src="classroom.js"></script>
</body>
</html>
