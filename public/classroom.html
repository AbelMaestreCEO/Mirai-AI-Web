<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula Virtual - Mirai AI</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        /* Estilos específicos para Classroom */
        .classroom-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        .stat-card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            text-align: center;
        }
        .stat-number {
            font-size: 2rem;
            font-weight: bold;
            color: var(--primary-color);
        }
        .task-list {
            display: grid;
            gap: 20px;
        }
        .task-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: transform 0.2s;
            border-left: 4px solid var(--accent-color);
        }
        .task-card:hover {
            transform: translateY(-2px);
        }
        .task-card.completed {
            border-left-color: #4caf50;
            opacity: 0.8;
        }
        .task-info h3 {
            margin: 0 0 8px 0;
            font-size: 1.1rem;
        }
        .task-meta {
            font-size: 0.85rem;
            color: var(--text-secondary);
            display: flex;
            gap: 15px;
        }
        .task-actions {
            display: flex;
            gap: 10px;
        }
        .btn-primary {
            background: var(--primary-color);
            color: white;
            padding: 8px 16px;
            border-radius: 6px;
            text-decoration: none;
            font-size: 0.9rem;
        }
        .status-badge {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: bold;
        }
        .status-pending { background: #fff3cd; color: #856404; }
        .status-completed { background: #d4edda; color: #155724; }
        .status-late { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
    <!-- Header (Igual que index.html) -->
    <header class="header">
        <div class="header-title">Aula Virtual</div>
        <button id="theme-toggle" class="theme-toggle">🌓</button>
        <button id="logout-btn" class="logout-btn">Salir</button>
    </header>

    <main class="classroom-container">
        <div class="dashboard-header">
            <h1>Mis Tareas</h1>
            <div id="user-greeting">Hola, Estudiante</div>
        </div>

        <!-- Estadísticas Rápidas -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-number" id="pending-count">0</div>
                <div>Pendientes</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="completed-count">0</div>
                <div>Completadas</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="avg-score">-</div>
                <div>Promedio</div>
            </div>
        </div>

        <!-- Lista de Tareas -->
        <div id="tasks-container" class="task-list">
            <!-- Se llena dinámicamente -->
            <div class="loading-state">Cargando tareas...</div>
        </div>
    </main>

    <script src="classroom.js"></script>
</body>
</html>
